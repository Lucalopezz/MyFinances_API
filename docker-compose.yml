services:
  mongodb:
    image: mongo:7
    container_name: myfinances-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - /mnt/dados/docker-volumes/myfinances-mongo:/data/db
    restart: no

  redis:
    image: redis:7-alpine
    container_name: finances-redis
    restart: no
    ports:
      - "6379:6379"
    volumes:
      - /mnt/dados/docker-volumes/finances-redis:/data
    command: redis-server --appendonly yes